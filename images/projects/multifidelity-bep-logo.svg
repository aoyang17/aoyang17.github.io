<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 144" role="img" aria-labelledby="title desc">
  <title id="title">Multifidelity BEP Analysis logo</title>
  <desc id="desc">Multifidelity break-even point analysis wordmark with CFD and multifidelity cost curves.</desc>
  <defs>
    <linearGradient id="bep-cfd" x1="20" y1="118" x2="136" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FB7185"/>
      <stop offset="0.55" stop-color="#E11D48"/>
      <stop offset="1" stop-color="#BE123C"/>
    </linearGradient>
    <linearGradient id="bep-mf" x1="18" y1="70" x2="138" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.55" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bep-word" x1="168" y1="72" x2="538" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.7" stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <filter id="bep-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="144" height="144" rx="32" fill="#F8FAFC"/>
  <rect x="24" y="24" width="96" height="96" rx="18" fill="#FFFFFF" stroke="#D8E2EA" stroke-width="2"/>
  <path d="M38 112V40M38 112H116" fill="none" stroke="#172033" stroke-linecap="round" stroke-width="5"/>
  <path d="M38 104C55 90 70 76 84 62C96 50 106 41 116 34" fill="none" stroke="url(#bep-cfd)" stroke-dasharray="9 8" stroke-linecap="round" stroke-width="7" filter="url(#bep-soft)"/>
  <path d="M38 75C58 74 78 73 96 72C105 72 112 71 118 70" fill="none" stroke="url(#bep-mf)" stroke-linecap="round" stroke-width="7" filter="url(#bep-soft)"/>
  <rect x="72" y="64" width="38" height="48" fill="#FFE7AD" opacity="0.72"/>
  <rect x="38" y="75" width="34" height="37" fill="#DBEAFE" opacity="0.82"/>
  <circle cx="76" cy="72" r="7.5" fill="#0F172A" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="52" cy="94" r="5.5" fill="#E11D48" stroke="#FFFFFF" stroke-width="2.5"/>
  <rect x="44" y="69" width="9" height="9" fill="#2563EB" stroke="#FFFFFF" stroke-width="2"/>

  <text
    x="168"
    y="70"
    fill="url(#bep-word)"
    font-family="GardensC, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    font-size="43"
    font-weight="400"
    letter-spacing="0"
    textLength="370"
    lengthAdjust="spacingAndGlyphs">Multifidelity BEP</text>
  <text
    x="171"
    y="104"
    fill="#475569"
    font-family="GardensC, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    font-size="17"
    font-weight="400"
    letter-spacing="1.6"
    textLength="365"
    lengthAdjust="spacingAndGlyphs">BREAK-EVEN POINT ANALYSIS</text>
</svg>
