<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 144" role="img" aria-labelledby="title desc">
  <title id="title">FlowDesign logo</title>
  <desc id="desc">FlowDesign wordmark with generative flow trajectories and design-space points.</desc>
  <defs>
    <linearGradient id="fd-flow-a" x1="12" y1="24" x2="132" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="0.48" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="fd-flow-b" x1="20" y1="106" x2="128" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="fd-word" x1="168" y1="72" x2="538" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.68" stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <filter id="fd-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="144" height="144" rx="32" fill="#F8FAFC"/>
  <g filter="url(#fd-soft)">
    <path d="M18 38C39 21 64 23 82 42C99 59 113 58 128 45" fill="none" stroke="url(#fd-flow-a)" stroke-linecap="round" stroke-width="9"/>
    <path d="M16 70C39 54 62 55 80 72C100 90 118 85 131 68" fill="none" stroke="url(#fd-flow-b)" stroke-linecap="round" stroke-width="9"/>
    <path d="M22 104C45 85 68 87 88 103C105 117 121 115 134 100" fill="none" stroke="url(#fd-flow-a)" stroke-linecap="round" stroke-width="9"/>
  </g>
  <circle cx="31" cy="38" r="6.5" fill="#2DD4BF" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="79" cy="71" r="6.5" fill="#2563EB" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="115" cy="46" r="6.5" fill="#7C3AED" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="47" cy="98" r="5.5" fill="#14B8A6" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="105" cy="108" r="5.5" fill="#6366F1" stroke="#FFFFFF" stroke-width="3"/>

  <text
    x="168"
    y="84"
    fill="url(#fd-word)"
    font-family="GardensC, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    font-size="58"
    font-weight="400"
    letter-spacing="0">FlowDesign</text>
  <text
    x="171"
    y="114"
    fill="#475569"
    font-family="GardensC, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    font-size="18"
    font-weight="400"
    letter-spacing="1.6">GENERATIVE ENGINEERING DESIGN</text>
</svg>
