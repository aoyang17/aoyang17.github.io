<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 144" role="img" aria-labelledby="title desc">
  <title id="title">CubeSats logo</title>
  <desc id="desc">CubeSats wordmark with a compact CubeSat, orbit trajectory, and multidisciplinary design nodes.</desc>
  <defs>
    <linearGradient id="cs-panel" x1="20" y1="28" x2="124" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="0.52" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="cs-body" x1="45" y1="38" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E0F2FE"/>
      <stop offset="0.48" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="cs-orbit" x1="18" y1="112" x2="130" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="0.58" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="cs-word" x1="168" y1="72" x2="538" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.68" stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <filter id="cs-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="144" height="144" rx="32" fill="#F8FAFC"/>

  <g filter="url(#cs-soft)">
    <path d="M18 101C44 72 76 52 126 43" fill="none" stroke="url(#cs-orbit)" stroke-linecap="round" stroke-width="7"/>
    <path d="M25 42C51 33 78 36 118 59" fill="none" stroke="url(#cs-orbit)" stroke-linecap="round" stroke-width="5" opacity="0.55"/>

    <path d="M38 65L59 55L80 67L59 80Z" fill="#DBEAFE" stroke="#FFFFFF" stroke-width="2.5"/>
    <path d="M59 80L80 67L80 92L59 106Z" fill="url(#cs-body)" stroke="#FFFFFF" stroke-width="2.5"/>
    <path d="M38 65L59 80L59 106L38 90Z" fill="#93C5FD" stroke="#FFFFFF" stroke-width="2.5"/>

    <path d="M82 62L119 48L126 71L89 86Z" fill="url(#cs-panel)" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round"/>
    <path d="M17 74L35 66L35 91L18 101Z" fill="url(#cs-panel)" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round"/>
    <path d="M94 57L101 80M108 52L115 75M86 70L123 56" fill="none" stroke="#E0F2FE" stroke-linecap="round" stroke-width="2" opacity="0.78"/>
    <path d="M24 73L24 97M30 70L30 94" fill="none" stroke="#E0F2FE" stroke-linecap="round" stroke-width="2" opacity="0.78"/>

    <path d="M58 80L58 57M58 57L63 50" fill="none" stroke="#1E3A8A" stroke-linecap="round" stroke-width="3"/>
    <circle cx="65" cy="48" r="4.5" fill="#2DD4BF" stroke="#FFFFFF" stroke-width="2.5"/>
  </g>

  <circle cx="24" cy="101" r="5.5" fill="#14B8A6" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="104" cy="51" r="5.5" fill="#2563EB" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="122" cy="43" r="5.5" fill="#7C3AED" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="80" cy="92" r="4.5" fill="#6366F1" stroke="#FFFFFF" stroke-width="2.5"/>

  <text
    x="168"
    y="84"
    fill="url(#cs-word)"
    font-family="GardensC, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    font-size="58"
    font-weight="400"
    letter-spacing="0"
    textLength="240"
    lengthAdjust="spacingAndGlyphs">CubeSats</text>
  <text
    x="171"
    y="114"
    fill="#475569"
    font-family="GardensC, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    font-size="18"
    font-weight="400"
    letter-spacing="1.35">Large-scale satellites MDO</text>
</svg>
